<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    {% include "_pwa_head.html" %}
    <title>忘记密码 - iFlyCompass</title>
    <link rel="stylesheet" href="/assets/css/loading.css">
    <link rel="stylesheet" href="/assets/css/material-icons.css">
    <link rel="stylesheet" href="/assets/css/element-ui.css">
    <link rel="stylesheet" href="/assets/css/auth.css">
</head>
<body>
    <div id="loading-overlay">
        <div class="loading-spinner"></div>
        <div class="loading-text">加载中...</div>
    </div>
    <div id="app">
        <div class="auth-container">
            <div class="auth-card">
                <div class="auth-header">
                    <img src="/assets/images/logo-trans-white.png" alt="Logo" class="auth-logo">
                    <h1>忘记密码</h1>
                </div>
                
                <div v-if="step === 1">
                    <el-form :model="form" :rules="rules" ref="form" label-width="0">
                        <el-form-item prop="username">
                            <el-input 
                                v-model="form.username" 
                                placeholder="请输入用户名"
                                prefix-icon="el-icon-user"
                            ></el-input>
                        </el-form-item>
                        <el-form-item>
                            <el-button 
                                type="primary" 
                                @click="checkUsername" 
                                :loading="loading"
                                style="width: 100%"
                            >
                                下一步
                            </el-button>
                        </el-form-item>
                    </el-form>
                </div>
                
                <div v-else-if="step === 2">
                    <div class="security-question-box">
                        <p class="question-label">安全问题：</p>
                        <p class="question-text">[[ securityQuestion ]]</p>
                    </div>
                    <el-form :model="form" :rules="rules" ref="form" label-width="0">
                        <el-form-item prop="answer">
                            <el-input 
                                v-model="form.answer" 
                                placeholder="请输入安全问题答案"
                                prefix-icon="el-icon-key"
                            ></el-input>
                        </el-form-item>
                        <el-form-item>
                            <el-button 
                                type="primary" 
                                @click="verifyAnswer" 
                                :loading="loading"
                                style="width: 100%"
                            >
                                验证答案
                            </el-button>
                        </el-form-item>
                    </el-form>
                </div>
                
                <div v-else-if="step === 3">
                    <el-form :model="form" :rules="rules" ref="form" label-width="0">
                        <el-form-item prop="newPassword">
                            <el-input 
                                v-model="form.newPassword" 
                                type="password"
                                placeholder="请输入新密码"
                                prefix-icon="el-icon-lock"
                                show-password
                            ></el-input>
                        </el-form-item>
                        <el-form-item prop="confirmPassword">
                            <el-input 
                                v-model="form.confirmPassword" 
                                type="password"
                                placeholder="请确认新密码"
                                prefix-icon="el-icon-lock"
                                show-password
                            ></el-input>
                        </el-form-item>
                        <el-form-item>
                            <el-button 
                                type="primary" 
                                @click="resetPassword" 
                                :loading="loading"
                                style="width: 100%"
                            >
                                重置密码
                            </el-button>
                        </el-form-item>
                    </el-form>
                </div>
                
                <div v-else-if="step === 4">
                    <div class="success-box">
                        <i class="el-icon-success" style="font-size: 48px; color: #67c23a;"></i>
                        <p class="success-text">密码重置成功！</p>
                        <el-button type="primary" @click="goToLogin" style="width: 100%">
                            返回登录
                        </el-button>
                    </div>
                </div>
                
                <div class="auth-footer">
                    <el-button type="text" @click="goToLogin">返回登录</el-button>
                </div>
            </div>
        </div>
    </div>

    <script src="/assets/js/vue.min.js"></script>
    <script src="/assets/js/element-ui.js"></script>
    <script>
        new Vue({
            el: '#app',
            delimiters: ['[[', ']]'],
            data() {
                var validateConfirmPassword = (rule, value, callback) => {
                    if (value !== this.form.newPassword) {
                        callback(new Error('两次输入的密码不一致'));
                    } else {
                        callback();
                    }
                };
                
                return {
                    step: 1,
                    loading: false,
                    securityQuestion: '',
                    form: {
                        username: '',
                        answer: '',
                        newPassword: '',
                        confirmPassword: ''
                    },
                    rules: {
                        username: [
                            { required: true, message: '请输入用户名', trigger: 'blur' }
                        ],
                        answer: [
                            { required: true, message: '请输入安全问题答案', trigger: 'blur' }
                        ],
                        newPassword: [
                            { required: true, message: '请输入新密码', trigger: 'blur' },
                            { min: 6, message: '密码长度至少6位', trigger: 'blur' }
                        ],
                        confirmPassword: [
                            { required: true, message: '请确认新密码', trigger: 'blur' },
                            { validator: validateConfirmPassword, trigger: 'blur' }
                        ]
                    }
                };
            },
            methods: {
                checkUsername() {
                    this.$refs.form.validate((valid) => {
                        if (valid) {
                            this.loading = true;
                            fetch('/api/auth/forgot-password/check', {
                                method: 'POST',
                                headers: {
                                    'Content-Type': 'application/json'
                                },
                                body: JSON.stringify({
                                    username: this.form.username
                                })
                            })
                            .then(response => response.json())
                            .then(data => {
                                this.loading = false;
                                if (data.error) {
                                    this.$message.error(data.error);
                                } else {
                                    this.securityQuestion = data.security_question;
                                    this.step = 2;
                                }
                            })
                            .catch(error => {
                                this.loading = false;
                                console.error('检查用户名失败:', error);
                                this.$message.error('操作失败，请稍后重试');
                            });
                        }
                    });
                },
                verifyAnswer() {
                    this.$refs.form.validate((valid) => {
                        if (valid) {
                            this.loading = true;
                            fetch('/api/auth/forgot-password/verify', {
                                method: 'POST',
                                headers: {
                                    'Content-Type': 'application/json'
                                },
                                body: JSON.stringify({
                                    username: this.form.username,
                                    answer: this.form.answer
                                })
                            })
                            .then(response => response.json())
                            .then(data => {
                                this.loading = false;
                                if (data.error) {
                                    this.$message.error(data.error);
                                } else {
                                    this.step = 3;
                                }
                            })
                            .catch(error => {
                                this.loading = false;
                                console.error('验证答案失败:', error);
                                this.$message.error('操作失败，请稍后重试');
                            });
                        }
                    });
                },
                resetPassword() {
                    this.$refs.form.validate((valid) => {
                        if (valid) {
                            this.loading = true;
                            fetch('/api/auth/forgot-password/reset', {
                                method: 'POST',
                                headers: {
                                    'Content-Type': 'application/json'
                                },
                                body: JSON.stringify({
                                    username: this.form.username,
                                    answer: this.form.answer,
                                    new_password: this.form.newPassword
                                })
                            })
                            .then(response => response.json())
                            .then(data => {
                                this.loading = false;
                                if (data.error) {
                                    this.$message.error(data.error);
                                } else {
                                    this.step = 4;
                                }
                            })
                            .catch(error => {
                                this.loading = false;
                                console.error('重置密码失败:', error);
                                this.$message.error('操作失败，请稍后重试');
                            });
                        }
                    });
                },
                goToLogin() {
                    window.location.href = '/login';
                }
            }
        });
    </script>
    <script src="/assets/js/offline-handler.js"></script>
    <script src="/assets/js/loading.js"></script>
{% include "_pwa_register.html" %}
</body>
</html>
