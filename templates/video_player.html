<!DOCTYPE html>
<html lang="zh-CN" class="touch-defense-5">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>视频播放器 - iFlyCompass</title>
    <link rel="stylesheet" href="/assets/css/loading.css">
    <link rel="stylesheet" href="/assets/css/material-icons.css">
    <link rel="stylesheet" href="/assets/css/element-ui.css">
    <link rel="stylesheet" href="/assets/css/console.css">
    <link rel="stylesheet" href="/assets/css/drop.css">
    <link rel="stylesheet" href="/assets/css/video-js.min.css">
    <style>
        .video-container {
            display: flex;
            flex-direction: column;
            background: #f5f7fa;
            overflow: hidden;
        }

        .video-main {
            flex: 1;
            display: flex;
            overflow: hidden;
            min-height: 0;
        }

        .video-sidebar {
            width: 300px;
            background: #fff;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            border-right: 1px solid #e6e6e6;
        }

        .video-sidebar-header {
            padding: 16px;
            border-bottom: 1px solid #e6e6e6;
            background: #fafafa;
        }

        .video-sidebar-header .sidebar-title {
            font-size: 15px;
            font-weight: 600;
            color: #303133;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .video-sidebar-header .sidebar-title .count {
            font-size: 12px;
            color: #909399;
            font-weight: normal;
        }

        .video-sidebar-body {
            flex: 1;
            overflow-y: auto;
            padding: 8px;
        }

        .video-item {
            display: flex;
            align-items: center;
            padding: 10px 12px;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s;
            margin-bottom: 4px;
            gap: 10px;
        }

        .video-item:hover {
            background: #f5f7fa;
        }

        .video-item.active {
            background: #ecf5ff;
        }

        .video-item .video-item-icon {
            width: 40px;
            height: 40px;
            border-radius: 6px;
            background: #f0f2f5;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }

        .video-item .video-item-icon i {
            font-size: 20px;
            color: #909399;
        }

        .video-item.active .video-item-icon {
            background: #409eff;
        }

        .video-item.active .video-item-icon i {
            color: #fff;
        }

        .video-item .video-item-info {
            flex: 1;
            overflow: hidden;
        }

        .video-item .video-item-name {
            font-size: 13px;
            color: #303133;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .video-item .video-item-size {
            font-size: 11px;
            color: #909399;
            margin-top: 2px;
        }

        .video-item.active .video-item-name {
            color: #409eff;
        }

        .video-player-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            padding: 20px;
            overflow: hidden;
            min-height: 0;
        }

        .video-wrapper {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: #fff;
            border-radius: 8px;
            box-shadow: 0 2px 12px 0 rgba(0, 0, 0, 0.1);
            overflow: hidden;
            min-height: 280px;
        }

        .video-title-bar {
            padding: 12px 16px;
            border-bottom: 1px solid #ebeef5;
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: #fafafa;
            flex-shrink: 0;
        }

        .video-title-bar .video-name {
            font-size: 14px;
            font-weight: 500;
            color: #303133;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            flex: 1;
        }

        .video-title-bar .video-size {
            font-size: 12px;
            color: #909399;
            margin-left: 12px;
            flex-shrink: 0;
        }

        .player-container {
            flex: 1;
            position: relative;
            background: #000;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 200px;
        }

        .video-js {
            width: 100%;
            height: 100%;
        }

        .video-js .vjs-tech {
            object-fit: contain;
        }

        .empty-video-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: #909399;
            gap: 16px;
            background: #fff;
            border-radius: 8px;
            box-shadow: 0 2px 12px 0 rgba(0, 0, 0, 0.1);
        }

        .empty-video-area .empty-icon {
            font-size: 80px;
            color: #dcdfe6;
        }

        .empty-video-area .empty-text {
            font-size: 16px;
            color: #909399;
        }

        .empty-video-area .empty-hint {
            font-size: 13px;
            color: #c0c4cc;
        }

        .back-btn {
            display: flex;
            align-items: center;
            cursor: pointer;
            color: #409eff;
            font-size: 14px;
        }

        .back-btn:hover {
            color: #66b1ff;
        }

        @media (max-width: 768px) {
            .video-sidebar {
                position: absolute;
                left: 0;
                top: 0;
                bottom: 0;
                z-index: 100;
                transform: translateX(-100%);
                transition: transform 0.3s;
                width: 280px;
            }

            .video-sidebar.mobile-open {
                transform: translateX(0);
            }

            .video-player-area {
                padding: 10px;
            }

            .mobile-sidebar-toggle {
                display: inline-flex !important;
            }
        }

        .mobile-sidebar-toggle {
            display: none;
            align-items: center;
            justify-content: center;
            width: 32px;
            height: 32px;
            border-radius: 4px;
            cursor: pointer;
            color: #606266;
            margin-right: 12px;
        }

        .mobile-sidebar-toggle:hover {
            background: #f5f7fa;
        }
    </style>
</head>
<body class="touch-defense-5">
    <div id="touch-buffer"></div>
    <div id="loading-overlay">
        <div class="loading-spinner"></div>
        <div class="loading-text">加载中...</div>
    </div>
    <div id="app">
        <el-container class="console-container">
            <el-aside width="64px" class="console-sidebar" :width="isCollapse ? '64px' : '200px'">
                <div class="sidebar-header" @click="toggleCollapse">
                    <img src="/assets/images/logo-trans-white.png" alt="Logo" class="sidebar-logo">
                    <span v-show="!isCollapse" class="sidebar-brand">iFlyCompass</span>
                    <i v-show="!isCollapse" class="el-icon-s-fold sidebar-toggle"></i>
                </div>
                <el-menu
                    :default-active="activeMenu"
                    class="el-menu-vertical-demo"
                    background-color="#1a365d"
                    text-color="#ffffff"
                    active-text-color="#409EFF"
                    :collapse="isCollapse"
                    @select="handleMenuClick"
                >
                    <el-menu-item index="dashboard">
                        <i class="el-icon-s-home"></i>
                        <span slot="title">首页</span>
                    </el-menu-item>
                    <el-menu-item index="tools">
                        <i class="el-icon-s-tools"></i>
                        <span slot="title">小工具</span>
                    </el-menu-item>
                    <el-menu-item index="games">
                        <i class="el-icon-s-marketing"></i>
                        <span slot="title">小游戏</span>
                    </el-menu-item>
                    <el-menu-item index="users" v-if="isAdmin">
                        <i class="el-icon-s-custom"></i>
                        <span slot="title">用户管理</span>
                    </el-menu-item>
                    <el-menu-item index="passkeys" v-if="isSuperAdmin">
                        <i class="el-icon-key"></i>
                        <span slot="title">Passkey 管理</span>
                    </el-menu-item>
                    <el-menu-item index="chat">
                        <i class="el-icon-chat-dot-round"></i>
                        <span slot="title">聊天室</span>
                    </el-menu-item>
                    <el-menu-item index="settings" v-if="isAdmin">
                        <i class="el-icon-setting"></i>
                        <span slot="title">系统设置</span>
                    </el-menu-item>
                </el-menu>
            </el-aside>

            <el-container>
                <el-header class="console-header">
                    <div class="header-left">
                        <span class="mobile-sidebar-toggle" @click="toggleMobileSidebar">
                            <i class="el-icon-menu"></i>
                        </span>
                        <div class="back-btn" @click="goBack">
                            <i class="el-icon-arrow-left"></i>
                            <span style="margin-left: 4px;">返回</span>
                        </div>
                    </div>
                    <div class="header-right">
                        <h1 style="font-size: 18px;">视频播放器</h1>
                    </div>
                </el-header>

                <div class="video-container" ref="videoContainer">
                    <div class="video-main">
                        <div class="video-sidebar" :class="{ 'mobile-open': mobileSidebarOpen }">
                            <div class="video-sidebar-header">
                                <div class="sidebar-title">
                                    <i class="el-icon-video-camera-solid"></i>
                                    <span>视频列表</span>
                                    <span class="count">([[ videos.length ]])</span>
                                </div>
                                <el-input
                                    v-model="searchKeyword"
                                    placeholder="搜索视频..."
                                    size="small"
                                    prefix-icon="el-icon-search"
                                    clearable
                                ></el-input>
                            </div>
                            <div class="video-sidebar-body">
                                <div
                                    v-for="video in filteredVideos"
                                    :key="video.name"
                                    class="video-item"
                                    :class="{ active: currentVideo && currentVideo.name === video.name }"
                                    @click="playVideo(video)"
                                >
                                    <div class="video-item-icon">
                                        <i class="el-icon-video-play"></i>
                                    </div>
                                    <div class="video-item-info">
                                        <div class="video-item-name">[[ video.name ]]</div>
                                        <div class="video-item-size">[[ video.size_display ]]</div>
                                    </div>
                                </div>
                                <div v-if="filteredVideos.length === 0" style="text-align: center; padding: 40px 16px; color: #909399;">
                                    <div style="font-size: 48px; margin-bottom: 12px; color: #dcdfe6;">
                                        <i class="el-icon-folder-opened"></i>
                                    </div>
                                    <div style="font-size: 14px;">[[ searchKeyword ? '未找到匹配视频' : '暂无视频文件' ]]</div>
                                    <div style="font-size: 12px; color: #c0c4cc; margin-top: 8px;" v-if="!searchKeyword">
                                        请将视频文件放入 instance/videos 目录
                                    </div>
                                </div>
                            </div>
                        </div>

                        <div class="video-player-area" @click="closeMobileSidebar">
                            <template v-if="currentVideo">
                                <div class="video-wrapper">
                                    <div class="video-title-bar">
                                        <span class="video-name">[[ currentVideo.name ]]</span>
                                        <span class="video-size">[[ currentVideo.size_display ]]</span>
                                    </div>
                                    <div class="player-container">
                                        <video
                                            id="video-player"
                                            class="video-js vjs-big-play-centered vjs-fluid"
                                            playsinline
                                        >
                                            <p class="vjs-no-js">
                                                您的浏览器不支持 HTML5 视频播放，请升级浏览器。
                                            </p>
                                        </video>
                                    </div>
                                </div>
                            </template>
                            <template v-else>
                                <div class="empty-video-area">
                                    <div class="empty-icon">
                                        <i class="el-icon-video-camera"></i>
                                    </div>
                                    <div class="empty-text">请在左侧选择视频播放</div>
                                    <div class="empty-hint">支持 MP4、WebM、OGG、MKV、AVI、MOV 等格式</div>
                                </div>
                            </template>
                        </div>
                    </div>
                </div>
            </el-container>
        </el-container>

        <el-dialog
            title="个人设置"
            :visible.sync="profileDialogVisible"
            width="450px"
        >
            <el-form :model="profileForm" label-width="80px" class="profile-dialog-form">
                <el-form-item label="用户名">
                    <el-input :value="username" disabled></el-input>
                </el-form-item>
                <el-form-item label="昵称">
                    <el-input v-model="profileForm.nickname" placeholder="请输入昵称"></el-input>
                </el-form-item>
                <el-form-item label="新密码" v-if="isSuperAdmin">
                    <el-input v-model="profileForm.password" type="password" placeholder="留空则不修改密码"></el-input>
                </el-form-item>
            </el-form>
            <span slot="footer" class="dialog-footer">
                <el-button @click="profileDialogVisible = false">取消</el-button>
                <el-button type="primary" @click="saveProfile">保存</el-button>
            </span>
        </el-dialog>
    </div>

    <script src="/assets/js/vue.min.js"></script>
    <script src="/assets/js/element-ui.js"></script>
    <script src="/assets/js/drop.js"></script>
    <script src="/assets/js/video.min.js"></script>
    <script>
        var defenseLayer5ScrollHandler = null;

        function enableDefenseLayer5() {
            if (!defenseLayer5ScrollHandler) {
                defenseLayer5ScrollHandler = function() {
                    var scrollLeft = document.documentElement.scrollLeft || document.body.scrollLeft;
                    var scrollTop = document.documentElement.scrollTop || document.body.scrollTop;

                    var container = document.querySelector('.console-container');
                    if (container) {
                        container.style.transform = 'translate(' + (-scrollLeft) + 'px, ' + (-scrollTop) + 'px)';
                    }

                    var sidebar = document.querySelector('.console-sidebar');
                    if (sidebar) {
                        sidebar.style.transform = 'translate(' + scrollLeft + 'px, ' + scrollTop + 'px)';
                    }

                    var header = document.querySelector('.console-header');
                    if (header) {
                        header.style.transform = 'translate(' + scrollLeft + 'px, ' + scrollTop + 'px)';
                    }
                };
                window.addEventListener('scroll', defenseLayer5ScrollHandler, { passive: true });
            }
        }

        console.log('=== iFlyCompass 视频播放器页面加载完成 ===');

        enableDefenseLayer5();

        new Vue({
            el: '#app',
            delimiters: ['[[', ']]'],
            data() {
                return {
                    isCollapse: {% if sidebar_expanded %}false{% else %}true{% endif %},
                    activeMenu: 'tools',
                    displayName: '{{ current_user.display_name }}',
                    username: '{{ current_user.username }}',
                    nickname: '{{ current_user.nickname or "" }}',
                    passkeyUsed: {% if current_user.passkey_used %}'{{ current_user.passkey_used }}'{% else %}null{% endif %},
                    isAdmin: {% if current_user.is_admin or current_user.is_super_admin %}true{% else %}false{% endif %},
                    isSuperAdmin: {% if current_user.is_super_admin %}true{% else %}false{% endif %},
                    userMenuVisible: false,
                    profileDialogVisible: false,
                    profileForm: {
                        nickname: '',
                        password: ''
                    },
                    mobileSidebarOpen: false,
                    searchKeyword: '',
                    videos: [],
                    currentVideo: null,
                    player: null
                };
            },
            computed: {
                filteredVideos() {
                    var self = this;
                    if (!this.searchKeyword) {
                        return this.videos;
                    }
                    return this.videos.filter(function(video) {
                        return video.name.toLowerCase().indexOf(self.searchKeyword.toLowerCase()) !== -1;
                    });
                }
            },
            mounted() {
                var self = this;
                console.log('Vue 实例挂载完成，用户信息:', {
                    username: this.username,
                    isAdmin: this.isAdmin,
                    isSuperAdmin: this.isSuperAdmin
                });
                this.loadVideos();
                this.updateContainerHeight();
                window.addEventListener('resize', this.updateContainerHeight);
            },
            beforeDestroy() {
                window.removeEventListener('resize', this.updateContainerHeight);
                if (this.player) {
                    this.player.dispose();
                }
            },
            methods: {
                updateContainerHeight() {
                    var header = document.querySelector('.console-header');
                    var container = this.$refs.videoContainer;
                    if (header && container) {
                        var headerHeight = header.offsetHeight || 60;
                        var availableHeight = window.innerHeight - headerHeight;
                        container.style.height = availableHeight + 'px';
                    }
                },
                loadVideos() {
                    var self = this;
                    console.log('[VideoPlayer] 开始加载视频列表...');
                    fetch('/api/videos')
                        .then(function(response) { 
                            console.log('[VideoPlayer] 视频列表API响应状态: ' + response.status);
                            return response.json(); 
                        })
                        .then(function(data) {
                            self.videos = data;
                            console.log('[VideoPlayer] 视频列表加载完成，共 ' + data.length + ' 个视频');
                        })
                        .catch(function(error) {
                            console.error('[VideoPlayer] 加载视频列表失败: ' + error.message);
                            self.$message.error('加载视频列表失败');
                        });
                },
                playVideo(video) {
                    var self = this;
                    this.currentVideo = video;
                    this.mobileSidebarOpen = false;
                    
                    console.log('[VideoPlayer] 选择视频: ' + video.name);
                    console.log('[VideoPlayer] 视频大小: ' + video.size_display);
                    console.log('[VideoPlayer] 视频URL: /api/video/' + encodeURIComponent(video.name));

                    this.$nextTick(function() {
                        self.initPlayer(video);
                    });
                },
                initPlayer(video) {
                    var self = this;
                    
                    console.log('[VideoPlayer] 开始初始化 Video.js 播放器...');

                    if (this.player) {
                        console.log('[VideoPlayer] 销毁旧播放器实例');
                        this.player.dispose();
                        this.player = null;
                    }

                    var videoElement = document.getElementById('video-player');
                    if (!videoElement) {
                        console.error('[VideoPlayer] 错误: 找不到 video 元素');
                        return;
                    }

                    console.log('[VideoPlayer] Video.js 版本: ' + (videojs && videojs.VERSION ? videojs.VERSION : '未知'));
                    console.log('[VideoPlayer] 浏览器 User-Agent: ' + navigator.userAgent);

                    var videoUrl = '/api/video/' + encodeURIComponent(video.name);
                    
                    try {
                        this.player = videojs('video-player', {
                            controls: true,
                            autoplay: false,
                            preload: 'auto',
                            fluid: true,
                            responsive: true,
                            playbackRates: [0.5, 0.75, 1, 1.25, 1.5, 2],
                            controlBar: {
                                children: [
                                    'playToggle',
                                    'volumePanel',
                                    'currentTimeDisplay',
                                    'timeDivider',
                                    'durationDisplay',
                                    'progressControl',
                                    'playbackRateMenuButton',
                                    'fullscreenToggle'
                                ]
                            },
                            language: 'zh-CN',
                            languages: {
                                'zh-CN': {
                                    'Play': '播放',
                                    'Pause': '暂停',
                                    'Current Time': '当前时间',
                                    'Duration': '时长',
                                    'Remaining Time': '剩余时间',
                                    'Stream Type': '流类型',
                                    'LIVE': '直播',
                                    'Loaded': '已加载',
                                    'Progress': '进度',
                                    'Fullscreen': '全屏',
                                    'Non-Fullscreen': '退出全屏',
                                    'Mute': '静音',
                                    'Unmute': '取消静音',
                                    'Playback Rate': '播放速度',
                                    'Subtitles': '字幕',
                                    'subtitles off': '关闭字幕',
                                    'Captions': '内嵌字幕',
                                    'captions off': '关闭内嵌字幕',
                                    'Chapters': '节目段落',
                                    'Close Modal Dialog': '关闭弹窗',
                                    'Descriptions': '描述',
                                    'descriptions off': '关闭描述',
                                    'Audio Track': '音轨',
                                    'You aborted the media playback': '视频播放被终止',
                                    'A network error caused the media download to fail part-way.': '网络错误导致视频下载中途失败',
                                    'The media could not be loaded, either because the server or network failed or because the format is not supported.': '视频无法加载，可能是服务器或网络问题，或者格式不支持',
                                    'The media playback was aborted due to a corruption problem or because the media used features your browser did not support.': '视频播放因数据损坏或浏览器不支持的功能而终止',
                                    'No compatible source was found for this media.': '找不到兼容的视频源'
                                }
                            }
                        });

                        console.log('[VideoPlayer] Video.js 播放器实例创建成功');

                        this.player.src({
                            src: videoUrl,
                            type: self.getMimeType(video.name)
                        });
                        console.log('[VideoPlayer] 设置视频源: ' + videoUrl + ' (类型: ' + self.getMimeType(video.name) + ')');

                        this.player.on('loadstart', function() {
                            console.log('[VideoPlayer] 开始加载视频数据');
                        });

                        this.player.on('progress', function() {
                            var buffered = self.player.buffered();
                            if (buffered && buffered.length > 0) {
                                var bufferedEnd = buffered.end(buffered.length - 1);
                                var duration = self.player.duration() || 0;
                                var percent = duration > 0 ? Math.round((bufferedEnd / duration) * 100) : 0;
                                console.log('[VideoPlayer] 缓冲进度: ' + percent + '%');
                            }
                        });

                        this.player.on('canplay', function() {
                            console.log('[VideoPlayer] 视频可以播放 (canplay)');
                        });
                        
                        this.player.on('canplaythrough', function() {
                            console.log('[VideoPlayer] 视频可以流畅播放 (canplaythrough)');
                        });
                        
                        this.player.on('play', function() {
                            console.log('[VideoPlayer] 开始播放');
                        });
                        
                        this.player.on('pause', function() {
                            console.log('[VideoPlayer] 暂停播放');
                        });
                        
                        this.player.on('ended', function() {
                            console.log('[VideoPlayer] 视频播放结束');
                        });
                        
                        this.player.on('seeking', function() {
                            console.log('[VideoPlayer] 正在跳转...');
                        });
                        
                        this.player.on('seeked', function() {
                            console.log('[VideoPlayer] 跳转完成');
                        });
                        
                        this.player.on('waiting', function() {
                            console.warn('[VideoPlayer] 等待数据缓冲...');
                        });

                        this.player.on('timeupdate', function() {
                            // 不记录时间更新，避免日志过多
                        });

                        this.player.on('error', function(e) {
                            var error = self.player.error();
                            var errorMsg = '未知错误';
                            var errorCode = -1;
                            
                            if (error) {
                                errorCode = error.code;
                                switch (errorCode) {
                                    case 1:
                                        errorMsg = 'MEDIA_ERR_ABORTED: 视频加载被终止';
                                        break;
                                    case 2:
                                        errorMsg = 'MEDIA_ERR_NETWORK: 网络错误，无法加载视频';
                                        break;
                                    case 3:
                                        errorMsg = 'MEDIA_ERR_DECODE: 视频解码失败，格式可能不支持';
                                        break;
                                    case 4:
                                        errorMsg = 'MEDIA_ERR_SRC_NOT_SUPPORTED: 视频源不支持或不存在';
                                        break;
                                    default:
                                        errorMsg = '错误代码: ' + errorCode + ', 消息: ' + (error.message || '无');
                                }
                            }
                            
                            console.error('[VideoPlayer] 播放错误: ' + errorMsg);
                                console.error('[VideoPlayer] 错误详情: ' + JSON.stringify(error));
                            self.$message.error('播放失败: ' + errorMsg);
                        });

                        this.player.on('loadedmetadata', function() {
                            var duration = self.player.duration();
                            var videoWidth = self.player.videoWidth();
                            var videoHeight = self.player.videoHeight();
                            console.log('[VideoPlayer] 视频元数据加载完成');
                                console.log('[VideoPlayer] 视频时长: ' + self.formatTime(duration) + ', 分辨率: ' + videoWidth + 'x' + videoHeight);
                        });

                        this.player.on('durationchange', function() {
                            console.log('[VideoPlayer] 视频时长: ' + self.formatTime(self.player.duration()));
                        });

                        this.player.on('resize', function() {
                            console.log('[VideoPlayer] 播放器尺寸调整');
                        });

                        console.log('[VideoPlayer] 播放器事件监听器注册完成');
                        
                        console.log('[VideoPlayer] 尝试自动播放...');
                        var playPromise = this.player.play();
                        
                        if (playPromise !== undefined) {
                            playPromise.then(function() {
                                console.log('[VideoPlayer] 自动播放成功');
                            }).catch(function(error) {
                                console.warn('[VideoPlayer] 自动播放失败: ' + error.message);
                                console.warn('[VideoPlayer] 可能需要用户手动点击播放按钮');
                            });
                        }

                    } catch (e) {
                        console.error('[VideoPlayer] 初始化播放器异常: ' + e.message);
                        console.error('[VideoPlayer] 异常堆栈: ' + e.stack);
                        this.$message.error('播放器初始化失败: ' + e.message);
                    }
                },
                getMimeType(filename) {
                    var ext = filename.split('.').pop().toLowerCase();
                    var mimeTypes = {
                        'mp4': 'video/mp4',
                        'webm': 'video/webm',
                        'ogg': 'video/ogg',
                        'ogv': 'video/ogg',
                        'mkv': 'video/x-matroska',
                        'avi': 'video/x-msvideo',
                        'mov': 'video/quicktime',
                        'wmv': 'video/x-ms-wmv',
                        'flv': 'video/x-flv',
                        'm4v': 'video/mp4',
                        'mpg': 'video/mpeg',
                        'mpeg': 'video/mpeg',
                        'ts': 'video/mp2t',
                        '3gp': 'video/3gpp'
                    };
                    return mimeTypes[ext] || 'video/mp4';
                },
                formatTime(seconds) {
                    if (isNaN(seconds) || !isFinite(seconds)) return '00:00';
                    var h = Math.floor(seconds / 3600);
                    var m = Math.floor((seconds % 3600) / 60);
                    var s = Math.floor(seconds % 60);
                    if (h > 0) {
                        return h + ':' + (m < 10 ? '0' : '') + m + ':' + (s < 10 ? '0' : '') + s;
                    }
                    return (m < 10 ? '0' : '') + m + ':' + (s < 10 ? '0' : '') + s;
                },
                toggleMobileSidebar() {
                    this.mobileSidebarOpen = !this.mobileSidebarOpen;
                },
                closeMobileSidebar() {
                    if (this.mobileSidebarOpen) {
                        this.mobileSidebarOpen = false;
                    }
                },
                toggleCollapse() {
                    this.isCollapse = !this.isCollapse;
                },
                toggleUserMenu() {
                    this.userMenuVisible = !this.userMenuVisible;
                },
                openProfileDialog() {
                    this.userMenuVisible = false;
                    this.profileForm.nickname = this.nickname;
                    this.profileForm.password = '';
                    this.profileDialogVisible = true;
                },
                goDropSettings() {
                    this.userMenuVisible = false;
                    window.location.href = '/drop/settings';
                },
                openDropDialog() {
                    this.userMenuVisible = false;
                    if (window.DropSender) {
                        window.DropSender.openDialog();
                    }
                },
                saveProfile() {
                    var self = this;
                    fetch('/api/user/profile', {
                        method: 'PUT',
                        headers: {
                            'Content-Type': 'application/json'
                        },
                        body: JSON.stringify(this.profileForm)
                    })
                    .then(function(response) { return response.json(); })
                    .then(function(data) {
                        if (data.error) {
                            self.$message.error(data.error);
                        } else {
                            self.$message.success('保存成功');
                            self.profileDialogVisible = false;
                            if (data.display_name) {
                                self.displayName = data.display_name;
                                self.nickname = self.profileForm.nickname;
                            }
                        }
                    })
                    .catch(function(error) {
                        console.error('保存失败:', error);
                        self.$message.error('保存失败');
                    });
                },
                confirmLogout() {
                    this.userMenuVisible = false;
                    this.$confirm('确定要退出登录吗？', '提示', {
                        confirmButtonText: '确定',
                        cancelButtonText: '取消',
                        type: 'warning'
                    })
                    .then(function() {
                        window.location.href = '/logout';
                    })
                    .catch(function() {
                        console.log('取消退出登录');
                    });
                },
                goBack() {
                    window.location.href = '/board/tools';
                },
                handleMenuClick(key) {
                    this.userMenuVisible = false;
                    if (key === 'dashboard') {
                        window.location.href = '/board';
                    } else if (key === 'users') {
                        window.location.href = '/board/users';
                    } else if (key === 'passkeys') {
                        window.location.href = '/board/passkeys';
                    } else if (key === 'chat') {
                        window.location.href = '/board/chat';
                    } else if (key === 'tools') {
                        window.location.href = '/board/tools';
                    } else if (key === 'games') {
                        window.location.href = '/board/games';
                    } else if (key === 'settings') {
                        window.location.href = '/board/settings';
                    }
                }
            }
        });
    </script>
    <script src="/assets/js/loading.js"></script>
</body>
