<!DOCTYPE html>
<html lang="zh-CN" class="touch-defense-5">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>B站视频 - iFlyCompass</title>
    <link rel="stylesheet" href="/assets/css/loading.css">
    <link rel="stylesheet" href="/assets/css/material-icons.css">
    <link rel="stylesheet" href="/assets/css/element-ui.css">
    <link rel="stylesheet" href="/assets/css/console.css">
    <link rel="stylesheet" href="/assets/css/drop.css">
    <link rel="stylesheet" href="/assets/css/plyr.min.css">
    <style>
        .bili-container {
            height: calc(100vh - 60px);
            display: flex;
            flex-direction: column;
            background: #f5f7fa;
            overflow: hidden;
        }

        .bili-main {
            flex: 1;
            display: flex;
            overflow: hidden;
            min-height: 0;
        }

        .bili-sidebar {
            width: 320px;
            background: #fff;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            border-right: 1px solid #e6e6e6;
        }

        .bili-tabs {
            display: flex;
            border-bottom: 1px solid #e6e6e6;
            background: #fafafa;
        }

        .bili-tab {
            flex: 1;
            padding: 12px;
            text-align: center;
            cursor: pointer;
            font-size: 13px;
            color: #606266;
            transition: all 0.2s;
            border-bottom: 2px solid transparent;
        }

        .bili-tab:hover {
            color: #409eff;
        }

        .bili-tab.active {
            color: #409eff;
            border-bottom-color: #409eff;
            font-weight: 500;
        }

        .bili-search {
            padding: 12px;
            border-bottom: 1px solid #e6e6e6;
        }

        .bili-list {
            flex: 1;
            overflow-y: auto;
            padding: 8px;
        }

        .bili-item {
            display: flex;
            padding: 10px;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s;
            margin-bottom: 4px;
            gap: 10px;
        }

        .bili-item:hover {
            background: #f5f7fa;
        }

        .bili-item .cover {
            width: 120px;
            height: 75px;
            border-radius: 4px;
            background: #e4e7ed;
            flex-shrink: 0;
            overflow: hidden;
            position: relative;
        }

        .bili-item .cover img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .bili-item .cover .duration {
            position: absolute;
            bottom: 4px;
            right: 4px;
            background: rgba(0, 0, 0, 0.7);
            color: #fff;
            font-size: 11px;
            padding: 1px 4px;
            border-radius: 2px;
        }

        .bili-item .info {
            flex: 1;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        .bili-item .title {
            font-size: 13px;
            color: #303133;
            line-height: 1.4;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
            margin-bottom: 6px;
        }

        .bili-item .meta {
            font-size: 11px;
            color: #909399;
            margin-top: auto;
        }

        .bili-item .meta span {
            margin-right: 12px;
        }

        .bili-item .cached-badge {
            display: inline-block;
            background: #67c23a;
            color: #fff;
            font-size: 10px;
            padding: 1px 4px;
            border-radius: 2px;
            margin-left: 6px;
        }

        .user-item {
            display: flex;
            align-items: center;
            padding: 12px;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s;
            margin-bottom: 4px;
            gap: 12px;
        }

        .user-item:hover {
            background: #f5f7fa;
        }

        .user-item .avatar {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            background: #e4e7ed;
            flex-shrink: 0;
            overflow: hidden;
        }

        .user-item .avatar img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .user-item .info {
            flex: 1;
            overflow: hidden;
        }

        .user-item .name {
            font-size: 14px;
            color: #303133;
            font-weight: 500;
        }

        .user-item .stats {
            font-size: 11px;
            color: #909399;
            margin-top: 4px;
        }

        .bili-player-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            padding: 20px;
            overflow: hidden;
            min-height: 0;
        }

        .player-wrapper {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: #fff;
            border-radius: 8px;
            box-shadow: 0 2px 12px 0 rgba(0, 0, 0, 0.1);
            overflow: hidden;
            min-height: 280px;
        }

        .video-header {
            padding: 12px 16px;
            border-bottom: 1px solid #ebeef5;
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: #fafafa;
            flex-shrink: 0;
        }

        .video-header .video-title {
            font-size: 14px;
            font-weight: 500;
            color: #303133;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            flex: 1;
        }

        .video-header .video-meta {
            font-size: 12px;
            color: #909399;
            margin-left: 12px;
            flex-shrink: 0;
        }

        .player-container {
            flex: 1;
            position: relative;
            background: #000;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 200px;
        }

        #bili-player {
            width: 100%;
            height: 100%;
            max-width: 100%;
            max-height: 100%;
        }

        .plyr {
            width: 100%;
            height: 100%;
            min-height: 180px;
        }

        .plyr__video-wrapper {
            height: calc(100% - 50px);
            min-height: 130px;
        }

        .plyr__controls {
            flex-shrink: 0;
            height: 50px;
        }

        .download-overlay {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.85);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: #fff;
            z-index: 10;
        }

        .download-overlay .progress-circle {
            width: 120px;
            height: 120px;
            position: relative;
            margin-bottom: 20px;
        }

        .download-overlay .progress-circle svg {
            transform: rotate(-90deg);
        }

        .download-overlay .progress-circle .bg {
            fill: none;
            stroke: rgba(255, 255, 255, 0.2);
            stroke-width: 8;
        }

        .download-overlay .progress-circle .progress {
            fill: none;
            stroke: #409eff;
            stroke-width: 8;
            stroke-linecap: round;
            transition: stroke-dashoffset 0.3s;
        }

        .download-overlay .progress-text {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 24px;
            font-weight: 600;
        }

        .download-overlay .status-text {
            font-size: 14px;
            color: #909399;
            margin-bottom: 8px;
        }

        .download-overlay .speed-text {
            font-size: 12px;
            color: #67c23a;
        }

        .empty-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: #909399;
            gap: 16px;
            background: #fff;
            border-radius: 8px;
            box-shadow: 0 2px 12px 0 rgba(0, 0, 0, 0.1);
        }

        .empty-area .empty-icon {
            font-size: 80px;
            color: #dcdfe6;
        }

        .empty-area .empty-text {
            font-size: 16px;
            color: #909399;
        }

        .back-btn {
            display: flex;
            align-items: center;
            cursor: pointer;
            color: #409eff;
            font-size: 14px;
        }

        .back-btn:hover {
            color: #66b1ff;
        }

        .load-more {
            text-align: center;
            padding: 12px;
            color: #909399;
            font-size: 12px;
            cursor: pointer;
        }

        .load-more:hover {
            color: #409eff;
        }

        @media (max-width: 768px) {
            .bili-sidebar {
                position: absolute;
                left: 0;
                top: 0;
                bottom: 0;
                z-index: 100;
                transform: translateX(-100%);
                transition: transform 0.3s;
                width: 300px;
            }

            .bili-sidebar.mobile-open {
                transform: translateX(0);
            }

            .bili-player-area {
                padding: 10px;
            }

            .mobile-sidebar-toggle {
                display: inline-flex !important;
            }

            .bili-item .cover {
                width: 100px;
                height: 62px;
            }
        }

        .mobile-sidebar-toggle {
            display: none;
            align-items: center;
            justify-content: center;
            width: 32px;
            height: 32px;
            border-radius: 4px;
            cursor: pointer;
            color: #606266;
            margin-right: 12px;
        }

        .mobile-sidebar-toggle:hover {
            background: #f5f7fa;
        }
    </style>
</head>
<body class="touch-defense-5">
    <div id="touch-buffer"></div>
    <div id="loading-overlay">
        <div class="loading-spinner"></div>
        <div class="loading-text">加载中...</div>
    </div>
    <div id="app">
        <el-container class="console-container">
            <el-aside width="64px" class="console-sidebar" :width="isCollapse ? '64px' : '200px'">
                <div class="sidebar-header" @click="toggleCollapse">
                    <img src="/assets/images/logo-trans-white.png" alt="Logo" class="sidebar-logo">
                    <span v-show="!isCollapse" class="sidebar-brand">iFlyCompass</span>
                    <i v-show="!isCollapse" class="el-icon-s-fold sidebar-toggle"></i>
                </div>
                <el-menu
                    :default-active="activeMenu"
                    class="el-menu-vertical-demo"
                    background-color="#1a365d"
                    text-color="#ffffff"
                    active-text-color="#409EFF"
                    :collapse="isCollapse"
                    @select="handleMenuClick"
                >
                    <el-menu-item index="dashboard">
                        <i class="el-icon-s-home"></i>
                        <span slot="title">首页</span>
                    </el-menu-item>
                    <el-menu-item index="tools">
                        <i class="el-icon-s-tools"></i>
                        <span slot="title">小工具</span>
                    </el-menu-item>
                    <el-menu-item index="games">
                        <i class="el-icon-s-marketing"></i>
                        <span slot="title">小游戏</span>
                    </el-menu-item>
                    <el-menu-item index="users" v-if="isAdmin">
                        <i class="el-icon-s-custom"></i>
                        <span slot="title">用户管理</span>
                    </el-menu-item>
                    <el-menu-item index="passkeys" v-if="isSuperAdmin">
                        <i class="el-icon-key"></i>
                        <span slot="title">Passkey 管理</span>
                    </el-menu-item>
                    <el-menu-item index="chat">
                        <i class="el-icon-chat-dot-round"></i>
                        <span slot="title">聊天室</span>
                    </el-menu-item>
                    <el-menu-item index="settings" v-if="isAdmin">
                        <i class="el-icon-setting"></i>
                        <span slot="title">系统设置</span>
                    </el-menu-item>
                </el-menu>
            </el-aside>

            <el-container>
                <el-header class="console-header">
                    <div class="header-left">
                        <span class="mobile-sidebar-toggle" @click="toggleMobileSidebar">
                            <i class="el-icon-menu"></i>
                        </span>
                        <div class="back-btn" @click="goBack">
                            <i class="el-icon-arrow-left"></i>
                            <span style="margin-left: 4px;">返回</span>
                        </div>
                    </div>
                    <div class="header-right">
                        <h1 style="font-size: 18px;">B站视频</h1>
                    </div>
                </el-header>

                <div class="bili-container">
                    <div class="bili-main">
                        <div class="bili-sidebar" :class="{ 'mobile-open': mobileSidebarOpen }">
                            <div class="bili-tabs">
                                <div class="bili-tab" :class="{ active: activeTab === 'recommend' }" @click="switchTab('recommend')">推荐</div>
                                <div class="bili-tab" :class="{ active: activeTab === 'search' }" @click="switchTab('search')">搜索</div>
                                <div class="bili-tab" :class="{ active: activeTab === 'user' }" @click="switchTab('user')">UP主</div>
                                <div class="bili-tab" :class="{ active: activeTab === 'cached' }" @click="switchTab('cached')">缓存</div>
                            </div>

                            <div class="bili-search" v-show="activeTab === 'search' || activeTab === 'user'">
                                <el-input
                                    v-model="searchKeyword"
                                    :placeholder="activeTab === 'user' ? '搜索UP主...' : '搜索视频...'"
                                    size="small"
                                    @keyup.enter.native="doSearch"
                                    clearable
                                >
                                    <el-button slot="append" icon="el-icon-search" @click="doSearch"></el-button>
                                </el-input>
                            </div>

                            <div class="bili-list">
                                <template v-if="activeTab === 'recommend'">
                                    <div v-for="video in recommendList" :key="video.bvid" class="bili-item" @click="selectVideo(video)">
                                        <div class="cover">
                                            <img :src="getCoverUrl(video.cover)" @error="handleImgError" loading="lazy">
                                            <span class="duration">[[ video.duration_display ]]</span>
                                        </div>
                                        <div class="info">
                                            <div class="title">[[ video.title ]]</div>
                                            <div class="meta">
                                                <span>[[ video.author ]]</span>
                                                <span><i class="el-icon-video-play"></i> [[ formatNumber(video.play) ]]</span>
                                                <span v-if="video.cached" class="cached-badge">已缓存</span>
                                            </div>
                                        </div>
                                    </div>
                                </template>

                                <template v-else-if="activeTab === 'search'">
                                    <div v-for="video in searchResults" :key="video.bvid" class="bili-item" @click="selectVideo(video)">
                                        <div class="cover">
                                            <img :src="getCoverUrl(video.cover)" @error="handleImgError" loading="lazy">
                                            <span class="duration">[[ video.duration_display ]]</span>
                                        </div>
                                        <div class="info">
                                            <div class="title">[[ video.title ]]</div>
                                            <div class="meta">
                                                <span>[[ video.author ]]</span>
                                                <span><i class="el-icon-video-play"></i> [[ formatNumber(video.play) ]]</span>
                                                <span v-if="video.cached" class="cached-badge">已缓存</span>
                                            </div>
                                        </div>
                                    </div>
                                    <div v-if="searchResults.length === 0 && !searchLoading" style="text-align: center; padding: 40px; color: #909399;">
                                        <div v-if="searchKeyword">未找到相关视频</div>
                                        <div v-else>输入关键词搜索视频</div>
                                    </div>
                                </template>

                                <template v-else-if="activeTab === 'user'">
                                    <div v-for="user in userResults" :key="user.mid" class="user-item" @click="selectUser(user)">
                                        <div class="avatar">
                                            <img :src="getAvatarUrl(user.avatar)" @error="handleImgError">
                                        </div>
                                        <div class="info">
                                            <div class="name">[[ user.uname ]]</div>
                                            <div class="stats">
                                                <span>粉丝: [[ formatNumber(user.fans) ]]</span>
                                                <span>视频: [[ user.videos ]]</span>
                                            </div>
                                        </div>
                                    </div>
                                    <div v-if="userResults.length === 0 && !userLoading" style="text-align: center; padding: 40px; color: #909399;">
                                        <div v-if="searchKeyword">未找到相关UP主</div>
                                        <div v-else>输入关键词搜索UP主</div>
                                    </div>
                                </template>

                                <template v-else-if="activeTab === 'cached'">
                                    <div v-for="video in cachedVideos" :key="video.bvid" class="bili-item" @click="playCached(video)">
                                        <div class="info" style="flex: 1;">
                                            <div class="title">[[ video.bvid ]]</div>
                                            <div class="meta">
                                                <span>[[ video.size_display ]]</span>
                                                <el-button type="text" size="mini" style="color: #f56c6c;" @click.stop="deleteCached(video.bvid)">删除</el-button>
                                            </div>
                                        </div>
                                    </div>
                                    <div v-if="cachedVideos.length === 0" style="text-align: center; padding: 40px; color: #909399;">
                                        暂无缓存视频
                                    </div>
                                </template>

                                <div v-if="listLoading" style="text-align: center; padding: 20px;">
                                    <i class="el-icon-loading"></i> 加载中...
                                </div>
                            </div>
                        </div>

                        <div class="bili-player-area" @click="closeMobileSidebar">
                            <template v-if="currentVideo">
                                <div class="player-wrapper">
                                    <div class="video-header">
                                        <span class="video-title">[[ currentVideo.title ]]</span>
                                        <span class="video-meta">
                                            [[ currentVideo.author ]] · [[ currentVideo.quality ]]
                                        </span>
                                    </div>
                                    <div class="player-container">
                                        <video id="bili-player" playsinline controls></video>
                                        
                                        <div class="download-overlay" v-if="downloadProgress && downloadProgress.status !== 'completed'">
                                            <div class="progress-circle">
                                                <svg width="120" height="120">
                                                    <circle class="bg" cx="60" cy="60" r="52"></circle>
                                                    <circle class="progress" cx="60" cy="60" r="52"
                                                        :stroke-dasharray="326.73"
                                                        :stroke-dashoffset="326.73 * (1 - downloadProgress.progress / 100)">
                                                    </circle>
                                                </svg>
                                                <div class="progress-text">[[ downloadProgress.progress ]]%</div>
                                            </div>
                                            <div class="status-text">
                                                <template v-if="downloadProgress.status === 'fetching'">获取视频信息...</template>
                                                <template v-else-if="downloadProgress.status === 'downloading'">正在下载...</template>
                                                <template v-else-if="downloadProgress.status === 'merging'">正在合并...</template>
                                                <template v-else-if="downloadProgress.status === 'error'">下载失败</template>
                                            </div>
                                            <div class="speed-text" v-if="downloadProgress.status === 'downloading'">
                                                [[ downloadProgress.speed_display ]] · [[ downloadProgress.downloaded_display ]] / [[ downloadProgress.total_display ]]
                                            </div>
                                            <div class="speed-text" v-else-if="downloadProgress.status === 'error'" style="color: #f56c6c;">
                                                [[ downloadProgress.error ]]
                                            </div>
                                        </div>
                                    </div>
                                </div>
                            </template>
                            <template v-else>
                                <div class="empty-area">
                                    <div class="empty-icon">
                                        <i class="el-icon-video-camera"></i>
                                    </div>
                                    <div class="empty-text">选择视频开始播放</div>
                                </div>
                            </template>
                        </div>
                    </div>
                </div>
            </el-container>
        </el-container>

        <el-dialog
            title="个人设置"
            :visible.sync="profileDialogVisible"
            width="450px"
        >
            <el-form :model="profileForm" label-width="80px" class="profile-dialog-form">
                <el-form-item label="用户名">
                    <el-input :value="username" disabled></el-input>
                </el-form-item>
                <el-form-item label="昵称">
                    <el-input v-model="profileForm.nickname" placeholder="请输入昵称"></el-input>
                </el-form-item>
                <el-form-item label="新密码" v-if="isSuperAdmin">
                    <el-input v-model="profileForm.password" type="password" placeholder="留空则不修改密码"></el-input>
                </el-form-item>
            </el-form>
            <span slot="footer" class="dialog-footer">
                <el-button @click="profileDialogVisible = false">取消</el-button>
                <el-button type="primary" @click="saveProfile">保存</el-button>
            </span>
        </el-dialog>
    </div>

    <script src="/assets/js/vue.min.js"></script>
    <script src="/assets/js/element-ui.js"></script>
    <script src="/assets/js/drop.js"></script>
    <script src="/assets/js/plyr.min.js"></script>
    <script>
        var defenseLayer5ScrollHandler = null;

        function enableDefenseLayer5() {
            if (!defenseLayer5ScrollHandler) {
                defenseLayer5ScrollHandler = function() {
                    var scrollLeft = document.documentElement.scrollLeft || document.body.scrollLeft;
                    var scrollTop = document.documentElement.scrollTop || document.body.scrollTop;

                    var container = document.querySelector('.console-container');
                    if (container) {
                        container.style.transform = 'translate(' + (-scrollLeft) + 'px, ' + (-scrollTop) + 'px)';
                    }

                    var sidebar = document.querySelector('.console-sidebar');
                    if (sidebar) {
                        sidebar.style.transform = 'translate(' + scrollLeft + 'px, ' + scrollTop + 'px)';
                    }

                    var header = document.querySelector('.console-header');
                    if (header) {
                        header.style.transform = 'translate(' + scrollLeft + 'px, ' + scrollTop + 'px)';
                    }
                };
                window.addEventListener('scroll', defenseLayer5ScrollHandler, { passive: true });
            }
        }

        console.log('=== iFlyCompass B站视频页面加载完成 ===');

        enableDefenseLayer5();

        new Vue({
            el: '#app',
            delimiters: ['[[', ']]'],
            data() {
                return {
                    isCollapse: {% if sidebar_expanded %}false{% else %}true{% endif %},
                    activeMenu: 'tools',
                    displayName: '{{ current_user.display_name }}',
                    username: '{{ current_user.username }}',
                    nickname: '{{ current_user.nickname or "" }}',
                    passkeyUsed: {% if current_user.passkey_used %}'{{ current_user.passkey_used }}'{% else %}null{% endif %},
                    isAdmin: {% if current_user.is_admin or current_user.is_super_admin %}true{% else %}false{% endif %},
                    isSuperAdmin: {% if current_user.is_super_admin %}true{% else %}false{% endif %},
                    userMenuVisible: false,
                    profileDialogVisible: false,
                    profileForm: {
                        nickname: '',
                        password: ''
                    },
                    mobileSidebarOpen: false,
                    activeTab: 'recommend',
                    searchKeyword: '',
                    recommendList: [],
                    searchResults: [],
                    userResults: [],
                    cachedVideos: [],
                    currentVideo: null,
                    player: null,
                    listLoading: false,
                    searchLoading: false,
                    userLoading: false,
                    downloadProgress: null,
                    progressTimer: null
                };
            },
            mounted() {
                var self = this;
                console.log('Vue 实例挂载完成');
                this.loadRecommend();
                this.loadCached();
            },
            beforeDestroy() {
                if (this.progressTimer) {
                    clearInterval(this.progressTimer);
                }
            },
            methods: {
                switchTab(tab) {
                    this.activeTab = tab;
                    this.mobileSidebarOpen = false;
                    
                    if (tab === 'recommend' && this.recommendList.length === 0) {
                        this.loadRecommend();
                    } else if (tab === 'cached') {
                        this.loadCached();
                    }
                },
                loadRecommend() {
                    var self = this;
                    this.listLoading = true;
                    fetch('/api/bili/recommend?ps=20')
                        .then(function(r) { return r.json(); })
                        .then(function(data) {
                            if (Array.isArray(data)) {
                                self.recommendList = data;
                            } else {
                                self.$message.error(data.error || '获取推荐失败');
                            }
                        })
                        .catch(function(e) {
                            console.error(e);
                            self.$message.error('获取推荐失败');
                        })
                        .finally(function() {
                            self.listLoading = false;
                        });
                },
                doSearch() {
                    var self = this;
                    if (!this.searchKeyword.trim()) return;
                    
                    if (this.activeTab === 'search') {
                        this.searchLoading = true;
                        fetch('/api/bili/search?keyword=' + encodeURIComponent(this.searchKeyword))
                            .then(function(r) { return r.json(); })
                            .then(function(data) {
                                if (data.videos) {
                                    self.searchResults = data.videos;
                                } else {
                                    self.$message.error(data.error || '搜索失败');
                                }
                            })
                            .catch(function(e) {
                                console.error(e);
                                self.$message.error('搜索失败');
                            })
                            .finally(function() {
                                self.searchLoading = false;
                            });
                    } else if (this.activeTab === 'user') {
                        this.userLoading = true;
                        fetch('/api/bili/search_user?keyword=' + encodeURIComponent(this.searchKeyword))
                            .then(function(r) { return r.json(); })
                            .then(function(data) {
                                if (data.users) {
                                    self.userResults = data.users;
                                } else {
                                    self.$message.error(data.error || '搜索失败');
                                }
                            })
                            .catch(function(e) {
                                console.error(e);
                                self.$message.error('搜索失败');
                            })
                            .finally(function() {
                                self.userLoading = false;
                            });
                    }
                },
                loadCached() {
                    var self = this;
                    fetch('/api/bili/cached')
                        .then(function(r) { return r.json(); })
                        .then(function(data) {
                            self.cachedVideos = data;
                        })
                        .catch(function(e) {
                            console.error(e);
                        });
                },
                selectVideo(video) {
                    var self = this;
                    this.currentVideo = video;
                    this.mobileSidebarOpen = false;
                    
                    fetch('/api/bili/video/' + video.bvid)
                        .then(function(r) { return r.json(); })
                        .then(function(data) {
                            if (data.error) {
                                self.$message.error(data.error);
                                return;
                            }
                            self.currentVideo = data;
                            
                            if (data.cached) {
                                self.playVideo(video.bvid);
                            } else {
                                self.startDownload(video.bvid);
                            }
                        })
                        .catch(function(e) {
                            console.error(e);
                            self.$message.error('获取视频信息失败');
                        });
                },
                selectUser(user) {
                    var self = this;
                    this.activeTab = 'search';
                    this.searchKeyword = user.uname;
                    
                    this.searchLoading = true;
                    fetch('/api/bili/user_videos/' + user.mid)
                        .then(function(r) { return r.json(); })
                        .then(function(data) {
                            if (data.videos) {
                                self.searchResults = data.videos;
                            } else {
                                self.$message.error(data.error || '获取视频失败');
                            }
                        })
                        .catch(function(e) {
                            console.error(e);
                            self.$message.error('获取视频失败');
                        })
                        .finally(function() {
                            self.searchLoading = false;
                        });
                },
                startDownload(bvid) {
                    var self = this;
                    
                    fetch('/api/bili/download/' + bvid, { method: 'POST' })
                        .then(function(r) { return r.json(); })
                        .then(function(data) {
                            if (data.status === 'cached') {
                                self.playVideo(bvid);
                            } else if (data.task) {
                                self.downloadProgress = data.task;
                                self.pollProgress(bvid);
                            } else if (data.error) {
                                self.$message.error(data.error);
                            }
                        })
                        .catch(function(e) {
                            console.error(e);
                            self.$message.error('启动下载失败');
                        });
                },
                pollProgress(bvid) {
                    var self = this;
                    
                    if (this.progressTimer) {
                        clearInterval(this.progressTimer);
                    }
                    
                    this.progressTimer = setInterval(function() {
                        fetch('/api/bili/progress/' + bvid)
                            .then(function(r) { return r.json(); })
                            .then(function(data) {
                                self.downloadProgress = data;
                                
                                if (data.status === 'completed') {
                                    clearInterval(self.progressTimer);
                                    self.playVideo(bvid);
                                    self.loadCached();
                                } else if (data.status === 'error') {
                                    clearInterval(self.progressTimer);
                                }
                            })
                            .catch(function(e) {
                                console.error(e);
                            });
                    }, 500);
                },
                playVideo(bvid) {
                    var self = this;
                    this.downloadProgress = null;
                    
                    this.$nextTick(function() {
                        var videoElement = document.getElementById('bili-player');
                        if (!videoElement) return;
                        
                        videoElement.src = '/api/bili/play/' + bvid;
                        
                        if (self.player) {
                            self.player.destroy();
                        }
                        
                        self.player = new Plyr(videoElement, {
                            controls: ['play-large', 'play', 'progress', 'current-time', 'duration', 'mute', 'volume', 'fullscreen'],
                            i18n: {
                                play: '播放',
                                pause: '暂停',
                                mute: '静音',
                                unmute: '取消静音',
                                fullscreen: '全屏',
                                exitFullscreen: '退出全屏'
                            }
                        });
                        
                        self.player.on('ready', function() {
                            self.player.play();
                        });
                    });
                },
                playCached(video) {
                    this.currentVideo = { bvid: video.bvid, title: video.bvid };
                    this.playVideo(video.bvid);
                    this.mobileSidebarOpen = false;
                },
                deleteCached(bvid) {
                    var self = this;
                    this.$confirm('确定删除该缓存视频？', '提示', {
                        confirmButtonText: '确定',
                        cancelButtonText: '取消',
                        type: 'warning'
                    }).then(function() {
                        fetch('/api/bili/delete/' + bvid, { method: 'DELETE' })
                            .then(function(r) { return r.json(); })
                            .then(function(data) {
                                if (data.success) {
                                    self.$message.success('删除成功');
                                    self.loadCached();
                                }
                            });
                    }).catch(function() {});
                },
                formatNumber(num) {
                    if (!num) return '0';
                    if (num >= 10000) {
                        return (num / 10000).toFixed(1) + '万';
                    }
                    return num.toString();
                },
                handleImgError(e) {
                    e.target.src = 'data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 75"><rect fill="%23e4e7ed" width="120" height="75"/><text x="50%" y="50%" fill="%23909399" font-size="12" text-anchor="middle">封面</text></svg>';
                },
                getCoverUrl(cover) {
                    if (!cover) return '';
                    if (cover.startsWith('data:')) return cover;
                    return '/api/bili/cover?url=' + encodeURIComponent(cover);
                },
                getAvatarUrl(avatar) {
                    if (!avatar) return '';
                    if (avatar.startsWith('data:')) return avatar;
                    return '/api/bili/cover?url=' + encodeURIComponent(avatar);
                },
                toggleMobileSidebar() {
                    this.mobileSidebarOpen = !this.mobileSidebarOpen;
                },
                closeMobileSidebar() {
                    if (this.mobileSidebarOpen) {
                        this.mobileSidebarOpen = false;
                    }
                },
                toggleCollapse() {
                    this.isCollapse = !this.isCollapse;
                },
                toggleUserMenu() {
                    this.userMenuVisible = !this.userMenuVisible;
                },
                openProfileDialog() {
                    this.userMenuVisible = false;
                    this.profileForm.nickname = this.nickname;
                    this.profileForm.password = '';
                    this.profileDialogVisible = true;
                },
                goDropSettings() {
                    this.userMenuVisible = false;
                    window.location.href = '/drop/settings';
                },
                openDropDialog() {
                    this.userMenuVisible = false;
                    if (window.DropSender) {
                        window.DropSender.openDialog();
                    }
                },
                saveProfile() {
                    var self = this;
                    fetch('/api/user/profile', {
                        method: 'PUT',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(this.profileForm)
                    })
                    .then(function(r) { return r.json(); })
                    .then(function(data) {
                        if (data.error) {
                            self.$message.error(data.error);
                        } else {
                            self.$message.success('保存成功');
                            self.profileDialogVisible = false;
                            if (data.display_name) {
                                self.displayName = data.display_name;
                                self.nickname = self.profileForm.nickname;
                            }
                        }
                    })
                    .catch(function(e) {
                        console.error(e);
                        self.$message.error('保存失败');
                    });
                },
                confirmLogout() {
                    this.userMenuVisible = false;
                    this.$confirm('确定要退出登录吗？', '提示', {
                        confirmButtonText: '确定',
                        cancelButtonText: '取消',
                        type: 'warning'
                    })
                    .then(function() { window.location.href = '/logout'; })
                    .catch(function() {});
                },
                goBack() {
                    window.location.href = '/board/tools';
                },
                handleMenuClick(key) {
                    this.userMenuVisible = false;
                    var routes = {
                        'dashboard': '/board',
                        'users': '/board/users',
                        'passkeys': '/board/passkeys',
                        'chat': '/board/chat',
                        'tools': '/board/tools',
                        'games': '/board/games',
                        'settings': '/board/settings'
                    };
                    if (routes[key]) {
                        window.location.href = routes[key];
                    }
                }
            }
        });
    </script>
    <script src="/assets/js/loading.js"></script>
</body>
</html>
